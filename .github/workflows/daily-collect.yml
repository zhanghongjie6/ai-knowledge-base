name: Daily Collection

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run collection pipeline
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate article JSONs
        run: python hooks/validate_json.py knowledge/articles/*.json

      - name: Check article quality
        run: python hooks/check_quality.py knowledge/articles/*.json

      - name: Commit and push new articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge/
          if git diff --cached --quiet -- knowledge/; then
            echo "No new data, skipping commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d-UTC")
            COUNT=$(ls knowledge/articles/*.json 2>/dev/null | wc -l | tr -d ' ')
            git commit -m "chore: daily collect ${COUNT} articles on ${TIMESTAMP}"
            git push
          fi
