name: Daily Collect And Push

on:
  schedule:
    # 北京时间每天 08:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run collection pipeline
        # 勿开 --verbose：httpcore DEBUG 日志极多，且旧 RSS 正则会卡死 arXiv
        timeout-minutes: 10
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --fresh-days 7
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate article JSONs
        run: python hooks/validate_json.py knowledge/articles/*.json

      - name: Check article quality
        run: python hooks/check_quality.py knowledge/articles/*.json
        continue-on-error: true

      - name: Push Top-3 tech/tool digest to WeChat
        timeout-minutes: 5
        run: python pipeline/digest_push.py --limit 3 --days 3
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}

      - name: Commit and push new articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge/
          if git diff --cached --quiet -- knowledge/; then
            echo "No new data, skipping commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d-UTC")
            COUNT=$(ls knowledge/articles/*.json 2>/dev/null | wc -l | tr -d ' ')
            git commit -m "chore: daily collect ${COUNT} articles on ${TIMESTAMP}"
            git push
          fi
