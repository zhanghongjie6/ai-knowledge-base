# RSS 数据源配置
# 通过 enabled 字段控制是否采集
# 量太大的源或未经验证的源默认为 enabled: false

sources:
  # ── 综合技术 ──────────────────────────────────────────────
  - name: "Hacker News Best"
    url: "https://hnrss.org/best"
    category: "综合技术"
    enabled: true
    notes: "Hacker News 高分帖子，采集后由 LLM 过滤 AI/LLM/Agent 相关内容"

  - name: "Hacker News (AI 关键词)"
    url: "https://hnrss.org/newest?q=AI+OR+LLM+OR+Agent"
    category: "综合技术"
    enabled: false
    notes: "按 AI 关键词搜索；原 search URL 易 404，默认关闭"

  - name: "Lobsters"
    url: "https://lobste.rs/rss"
    category: "综合技术"
    enabled: true
    notes: "Lobsters 全站 RSS，采集后由 LLM 过滤 AI/ML/编程相关条目"

  # ── AI 研究 ────────────────────────────────────────────────
  - name: "arXiv cs.AI"
    url: "https://rss.arxiv.org/rss/cs.AI"
    category: "AI 研究"
    enabled: true

  # ── 公司博客 ──────────────────────────────────────────────
  - name: "OpenAI Blog"
    url: "https://openai.com/news/rss.xml"
    category: "公司博客"
    enabled: true
    notes: "原 /blog/rss.xml 会 307 跳转到 /news/rss.xml"

  - name: "Anthropic Research"
    url: "https://www.anthropic.com/news"
    category: "公司博客"
    enabled: false
    notes: "官方无公开 RSS；旧 URL /newsroom 已 404。页面抓取暂未实现，默认关闭"

  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    category: "公司博客"
    enabled: true

  # ── 中文社区 ──────────────────────────────────────────────
  - name: "量子位"
    url: "https://www.qbitai.com/feed"
    category: "中文社区"
    enabled: false
    notes: "常返回 403；按需开启"

  - name: "机器之心"
    url: "https://www.jiqizhixin.com/rss"
    category: "中文社区"
    enabled: false
    notes: "RSS 可用性待确认（请求超时）；默认关闭"
